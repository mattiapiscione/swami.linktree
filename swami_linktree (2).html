<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swami | Link</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5ede8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
  }

  .bg-pattern {
    position: fixed;
    inset: 0;
    background-color: #f5ede8;
    z-index: 0;
    overflow: hidden;
  }

  .bg-pattern::before,
  .bg-pattern::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: floatOrb 14s ease-in-out infinite alternate;
  }

  .bg-pattern::before {
    width: 70vw;
    height: 70vw;
    max-width: 600px;
    max-height: 600px;
    background: radial-gradient(circle, rgba(232, 160, 140, 0.55) 0%, rgba(196, 140, 165, 0.3) 50%, transparent 75%);
    top: -15%;
    left: -20%;
    animation-duration: 14s;
  }

  .bg-pattern::after {
    width: 65vw;
    height: 65vw;
    max-width: 560px;
    max-height: 560px;
    background: radial-gradient(circle, rgba(196, 140, 175, 0.5) 0%, rgba(220, 170, 180, 0.28) 50%, transparent 75%);
    bottom: -20%;
    right: -15%;
    animation-duration: 17s;
    animation-delay: -6s;
  }

  .orb-mid {
    position: fixed;
    width: 55vw;
    height: 55vw;
    max-width: 480px;
    max-height: 480px;
    border-radius: 50%;
    filter: blur(90px);
    background: radial-gradient(circle, rgba(245, 210, 190, 0.45) 0%, rgba(210, 160, 170, 0.2) 60%, transparent 80%);
    top: 30%;
    left: 30%;
    animation: floatOrb2 19s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes floatOrb {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(6%, 8%) scale(1.08); }
    66%  { transform: translate(-4%, 5%) scale(0.95); }
    100% { transform: translate(8%, -6%) scale(1.05); }
  }

  @keyframes floatOrb2 {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.8; }
    40%  { transform: translate(-8%, -6%) scale(1.12); opacity: 1; }
    100% { transform: translate(6%, 8%) scale(0.9); opacity: 0.7; }
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 0 20px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FOTO */
  .photo-wrap {
    margin-top: 48px;
    margin-bottom: 20px;
    position: relative;
    animation: fadeUp 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .photo-ring {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #d4a090, #b8839a, #d4a090);
  }

  .photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #f5ede8;
  }

  .photo-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* NOME */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: #2d1f1a;
    letter-spacing: 0.02em;
    text-align: center;
    animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .subtitle {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: #9a7068;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 32px;
    text-align: center;
    animation: fadeUp 0.9s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(to right, transparent, #c4909a, transparent);
    margin-bottom: 28px;
    animation: fadeUp 0.9s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* LINK BUTTONS */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 22px;
    border-radius: 16px;
    text-decoration: none;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s ease;
    background: rgba(255,255,255,0.15);
  }

  .link-btn:hover::before { opacity: 1; }
  .link-btn:hover { transform: translateY(-3px) scale(1.01); }

  .link-btn.telegram {
    background: linear-gradient(135deg, #c4606a, #a8415a);
    box-shadow: 0 8px 30px rgba(196, 96, 106, 0.35);
    animation: fadeUp 0.9s 0.38s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .link-btn.instagram {
    background: linear-gradient(135deg, #3d2c2c, #5c3d3d);
    box-shadow: 0 8px 30px rgba(61, 44, 44, 0.35);
    animation: fadeUp 0.9s 0.48s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .link-btn:hover.telegram { box-shadow: 0 12px 40px rgba(196, 96, 106, 0.5); }
  .link-btn:hover.instagram { box-shadow: 0 12px 40px rgba(61, 44, 44, 0.5); }

  .btn-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.2rem;
  }

  .btn-text {
    flex: 1;
  }

  .btn-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: #fff;
    display: block;
    line-height: 1;
  }

  .btn-sub {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    display: block;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .btn-arrow {
    color: rgba(255,255,255,0.5);
    font-size: 0.9rem;
    transition: transform 0.25s ease;
  }

  .link-btn:hover .btn-arrow {
    transform: translateX(4px);
    color: rgba(255,255,255,0.9);
  }

  /* FOOTER */
  .footer {
    margin-top: 36px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: #c4a098;
    letter-spacing: 0.05em;
    animation: fadeUp 0.9s 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* floating hearts */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .heart {
    position: absolute;
    font-size: 0.7rem;
    opacity: 0.15;
    animation: floatHeart linear infinite;
    color: #c4909a;
    filter: blur(0.3px);
  }

  @keyframes floatHeart {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    8%   { opacity: 0.15; }
    50%  { transform: translateY(50vh) rotate(180deg) scale(1.1); opacity: 0.18; }
    92%  { opacity: 0.12; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(0.9); opacity: 0; }
  }
</style>
</head>
